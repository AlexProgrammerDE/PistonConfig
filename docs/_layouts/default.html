<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#fbfbf8" data-theme-color>
    <link rel="icon" href="{{ '/assets/img/mark.svg' | relative_url }}" type="image/svg+xml">
    <script>
      (function () {
        var key = "pistonconfig-theme";
        var theme = "light";

        try {
          var stored = window.localStorage.getItem(key);
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          theme = stored === "dark" || stored === "light" ? stored : prefersDark ? "dark" : "light";
        } catch (error) {
          theme = "light";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="reading-progress" data-reading-progress aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/img/mark.svg' | relative_url }}" alt="" width="28" height="28">
        <span>PistonConfig</span>
      </a>
      <div class="header-actions">
        <nav class="top-nav" aria-label="Main navigation">
          <a href="{{ '/guides/getting-started.html' | relative_url }}">Start</a>
          <a href="{{ '/guides/installation.html' | relative_url }}">Install</a>
          <a href="{{ '/examples/' | relative_url }}">Examples</a>
          <a href="{{ '/reference/modules.html' | relative_url }}">Reference</a>
          <a href="https://github.com/AlexProgrammerDE/PistonConfig">GitHub</a>
        </nav>
        <button class="search-open" type="button" data-search-open aria-label="Search documentation">
          <span class="search-icon" aria-hidden="true"></span>
          <span>Search</span>
        </button>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode" aria-pressed="false">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
          <span data-theme-toggle-label>Dark</span>
        </button>
      </div>
    </header>
    <div class="shell">
      <aside class="sidebar" aria-label="Documentation navigation">
        {% for section in site.data.navigation.sections %}
          <div class="nav-section">
            <p>{{ section.title }}</p>
            {% for link in section.links %}
              <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
            {% endfor %}
          </div>
        {% endfor %}
      </aside>
      <main class="page" data-page-url="{{ page.url | relative_url }}" data-page-title="{{ page.title | default: site.title }}">
        <nav class="breadcrumbs" aria-label="Breadcrumbs" data-breadcrumbs></nav>
        {{ content }}
      </main>
      <aside class="toc" aria-label="Page outline">
        <p>On This Page</p>
        <nav id="page-toc"></nav>
      </aside>
    </div>
    <dialog class="search-dialog" data-search-dialog data-search-index="{{ '/search.json' | relative_url }}" aria-labelledby="search-title">
      <form class="search-form" method="dialog">
        <div>
          <h2 id="search-title">Search Documentation</h2>
          <input data-search-input type="search" autocomplete="off" placeholder="Search docs">
        </div>
        <button type="button" data-search-close aria-label="Close search">Close</button>
      </form>
      <div class="search-results" data-search-results role="list"></div>
    </dialog>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
